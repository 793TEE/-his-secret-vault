<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — His Secret Vault</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-dark, #0d1117); }
    .auth-box { background: var(--card-bg, #161b22); border: 1px solid var(--border, #30363d); border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 420px; }
    .auth-box h2 { color: #fff; margin: 0 0 0.5rem; }
    .auth-box p { color: #8b949e; margin: 0 0 1.5rem; font-size: 0.95rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; color: #c9d1d9; margin-bottom: 0.4rem; font-size: 0.9rem; }
    .form-input { width: 100%; padding: 0.7rem 1rem; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #fff; font-size: 1rem; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: #c9a227; }
    .btn-primary { width: 100%; padding: 0.8rem; background: #c9a227; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    .alert-success { background: rgba(56,161,105,0.15); color: #38a169; border: 1px solid rgba(56,161,105,0.3); }
    .alert-error { background: rgba(229,62,62,0.15); color: #fc8181; border: 1px solid rgba(229,62,62,0.3); }
    .back-link { display: block; text-align: center; margin-top: 1.25rem; color: #8b949e; font-size: 0.9rem; text-decoration: none; }
    .back-link:hover { color: #c9a227; }
  </style>
</head>
<body>
  <div class="auth-box">
    <h2>Forgot Password</h2>
    <p>Enter your email and we'll send you a reset link.</p>

    <div id="alert" style="display:none" class="alert"></div>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@email.com" required>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Send Reset Link</button>
    </form>

    <a href="/login" class="back-link">← Back to Login</a>
  </div>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const alertEl = document.getElementById('alert');
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.textContent = 'Sending...';
      alertEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        alertEl.className = 'alert alert-success';
        alertEl.textContent = data.message || 'Check your email for a reset link.';
        alertEl.style.display = 'block';
        document.getElementById('forgot-form').style.display = 'none';
      } catch (err) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = 'Something went wrong. Please try again.';
        alertEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>

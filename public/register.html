<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started - His Secret Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="/" class="navbar-brand">
        <span>His Secret Vault</span>
      </a>
      <div class="navbar-actions">
        <a href="/login" class="btn btn-outline btn-sm">Login</a>
      </div>
    </div>
  </nav>

  <!-- Register Section -->
  <section class="hero" style="min-height: 100vh; display: flex; align-items: center; padding: 100px 0 50px;">
    <div class="container">
      <div style="max-width: 500px; margin: 0 auto;">
        <div class="card">
          <div class="card-body" style="padding: 2.5rem;">
            <div class="text-center mb-4">
              <h2>Create Your Account</h2>
              <p style="color: var(--text-medium);">Start your journey to business success</p>
            </div>

            <form id="register-form">
              <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                  <label class="form-label">First Name</label>
                  <input type="text" name="firstName" class="form-input" placeholder="John" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Last Name</label>
                  <input type="text" name="lastName" class="form-input" placeholder="Doe" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-input" placeholder="(555) 123-4567">
              </div>
              <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="Create a password" required minlength="6">
              </div>
              <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirmPassword" class="form-input" placeholder="Confirm your password" required minlength="6">
              </div>
              <div class="form-group">
                <label style="display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer;">
                  <input type="checkbox" name="terms" required style="margin-top: 4px;">
                  <span style="font-size: 0.875rem; color: var(--text-medium);">
                    I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>
                  </span>
                </label>
              </div>
              <button type="submit" class="btn btn-primary btn-lg btn-block">Create Account</button>
            </form>

            <div class="text-center mt-4">
              <p style="color: var(--text-medium);">
                Already have an account? <a href="/login">Sign in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form = e.target;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      const submitBtn = form.querySelector('button[type="submit"]');

      if (data.password !== data.confirmPassword) {
        App.showAlert('Passwords do not match', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        await App.register({
          name: `${data.firstName} ${data.lastName}`,
          email: data.email,
          phone: data.phone,
          password: data.password
        });
        App.showAlert('Account created successfully!', 'success');
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } catch (error) {
        App.showAlert(error.message || 'Registration failed', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>

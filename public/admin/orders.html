<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h1>His Secret Vault</h1>
        <span>Admin Portal</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="sidebar-link">
          <span class="nav-icon">&#128200;</span>
          Dashboard
        </a>
        <a href="/admin/clients.html" class="sidebar-link">
          <span class="nav-icon">&#128101;</span>
          Clients
        </a>
        <a href="/admin/orders.html" class="sidebar-link active">
          <span class="nav-icon">&#128230;</span>
          Orders
        </a>
        <a href="/admin/leads.html" class="sidebar-link">
          <span class="nav-icon">&#127919;</span>
          Leads
        </a>
        <a href="/admin/contacts.html" class="sidebar-link">
          <span class="nav-icon">&#128236;</span>
          Contacts
        </a>
        <a href="/admin/services.html" class="sidebar-link">
          <span class="nav-icon">&#128736;</span>
          Services
        </a>
        <a href="/admin/settings.html" class="sidebar-link">
          <span class="nav-icon">&#9881;</span>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="AdminAPI.logout()" class="btn btn-outline btn-sm btn-block">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Order Management</h1>
      </div>

      <div class="admin-content">
        <!-- Filters -->
        <div class="filters-bar">
          <select id="status-filter" class="form-select" style="max-width: 200px;">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <select id="category-filter" class="form-select" style="max-width: 200px;">
            <option value="">All Categories</option>
            <option value="business-formation">Business Formation</option>
            <option value="credit-repair">Credit Repair</option>
            <option value="funding">Funding</option>
          </select>
          <button onclick="loadOrders()" class="btn btn-primary btn-sm">Apply Filters</button>
        </div>

        <!-- Orders Table -->
        <div class="content-section">
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Client</th>
                  <th>Service</th>
                  <th>Category</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Payment</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="orders-table">
                <tr>
                  <td colspan="9" class="text-center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" class="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div id="order-modal" class="modal-overlay">
    <div class="modal modal-large">
      <div class="modal-header">
        <h3>Order Details</h3>
        <button class="modal-close" onclick="AdminAPI.closeModal('order-modal')">&times;</button>
      </div>
      <div class="modal-body" id="order-detail-content">
        Loading...
      </div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    AdminAPI.requireAuth();

    let currentPage = 1;

    async function loadOrders(page = 1) {
      currentPage = page;
      const status = document.getElementById('status-filter').value;
      const category = document.getElementById('category-filter').value;

      try {
        const data = await AdminAPI.getOrders({ status, category, page });

        const html = data.orders.map(order => `
          <tr>
            <td>#${order.id}</td>
            <td>${AdminAPI.escapeHtml(order.first_name)} ${AdminAPI.escapeHtml(order.last_name)}</td>
            <td>${AdminAPI.escapeHtml(order.service_name)}</td>
            <td><span class="badge badge-info">${AdminAPI.escapeHtml(order.category)}</span></td>
            <td>${AdminAPI.formatCurrency(order.amount)}</td>
            <td>${AdminAPI.renderBadge(order.status)}</td>
            <td>${AdminAPI.renderBadge(order.payment_status)}</td>
            <td>${AdminAPI.formatDate(order.created_at)}</td>
            <td>
              <button class="btn btn-sm btn-outline" onclick="viewOrder(${order.id})">View</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('orders-table').innerHTML = html || '<tr><td colspan="9" class="text-center">No orders found</td></tr>';

        // Render pagination
        AdminAPI.renderPagination('pagination', data.pagination, loadOrders);

      } catch (error) {
        AdminAPI.showError('Failed to load orders: ' + error.message);
      }
    }

    async function viewOrder(id) {
      try {
        const order = await AdminAPI.getOrder(id);

        const html = `
          <div class="order-detail">
            <div class="order-info-grid">
              <div class="info-item">
                <label>Client</label>
                <div>${AdminAPI.escapeHtml(order.first_name)} ${AdminAPI.escapeHtml(order.last_name)}</div>
              </div>
              <div class="info-item">
                <label>Email</label>
                <div>${AdminAPI.escapeHtml(order.email)}</div>
              </div>
              <div class="info-item">
                <label>Phone</label>
                <div>${AdminAPI.escapeHtml(order.phone || '-')}</div>
              </div>
              <div class="info-item">
                <label>Service</label>
                <div>${AdminAPI.escapeHtml(order.service_name)}</div>
              </div>
              <div class="info-item">
                <label>Amount</label>
                <div>${AdminAPI.formatCurrency(order.amount)}</div>
              </div>
              <div class="info-item">
                <label>Payment Status</label>
                <div>${AdminAPI.renderBadge(order.payment_status)}</div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Order Status</label>
              <select id="order-status" class="form-select">
                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                <option value="active" ${order.status === 'active' ? 'selected' : ''}>Active</option>
                <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Notes</label>
              <textarea id="order-notes" class="form-textarea">${AdminAPI.escapeHtml(order.notes || '')}</textarea>
            </div>

            <button class="btn btn-primary" onclick="saveOrder(${order.id})">Save Changes</button>

            <hr style="margin: 2rem 0;">

            <h4>Progress Steps</h4>
            <div class="progress-steps">
              ${order.progress.map(step => `
                <div class="progress-step-card">
                  <div class="progress-step-header">
                    <strong>${step.step_number}. ${AdminAPI.escapeHtml(step.step_name)}</strong>
                    ${AdminAPI.renderBadge(step.status)}
                  </div>
                  <div class="progress-step-body">
                    <select class="form-select" id="step-status-${step.id}">
                      <option value="pending" ${step.status === 'pending' ? 'selected' : ''}>Pending</option>
                      <option value="in_progress" ${step.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                      <option value="completed" ${step.status === 'completed' ? 'selected' : ''}>Completed</option>
                    </select>
                    <textarea class="form-textarea" id="step-notes-${step.id}" placeholder="Notes">${AdminAPI.escapeHtml(step.notes || '')}</textarea>
                    <button class="btn btn-sm btn-primary" onclick="updateStep(${order.id}, ${step.id})">Update Step</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        document.getElementById('order-detail-content').innerHTML = html;
        AdminAPI.openModal('order-modal');
      } catch (error) {
        AdminAPI.showError('Failed to load order: ' + error.message);
      }
    }

    async function saveOrder(id) {
      const data = {
        status: document.getElementById('order-status').value,
        notes: document.getElementById('order-notes').value
      };

      try {
        await AdminAPI.updateOrder(id, data);
        AdminAPI.showSuccess('Order updated successfully');
        loadOrders(currentPage);
      } catch (error) {
        AdminAPI.showError('Failed to update order: ' + error.message);
      }
    }

    async function updateStep(orderId, stepId) {
      const data = {
        status: document.getElementById(`step-status-${stepId}`).value,
        notes: document.getElementById(`step-notes-${stepId}`).value
      };

      try {
        await AdminAPI.updateOrderProgress(orderId, stepId, data);
        AdminAPI.showSuccess('Step updated successfully');
        viewOrder(orderId);
      } catch (error) {
        AdminAPI.showError('Failed to update step: ' + error.message);
      }
    }

    loadOrders();
  </script>
</body>
</html>

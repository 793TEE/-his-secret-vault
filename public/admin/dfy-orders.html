<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Done-For-You Orders - Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h1>His Secret Vault</h1>
        <span>Admin Portal</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="sidebar-link">
          <span class="nav-icon">&#128200;</span>
          Dashboard
        </a>
        <a href="/admin/clients.html" class="sidebar-link">
          <span class="nav-icon">&#128101;</span>
          Clients
        </a>
        <a href="/admin/subscriptions.html" class="sidebar-link">
          <span class="nav-icon">&#128179;</span>
          Subscriptions
        </a>
        <a href="/admin/dfy-orders.html" class="sidebar-link active">
          <span class="nav-icon">&#128230;</span>
          DFY Orders
        </a>
        <a href="/admin/plans.html" class="sidebar-link">
          <span class="nav-icon">&#128176;</span>
          Plans & Bundles
        </a>
        <a href="/admin/leads.html" class="sidebar-link">
          <span class="nav-icon">&#127919;</span>
          Leads
        </a>
        <a href="/admin/contacts.html" class="sidebar-link">
          <span class="nav-icon">&#128236;</span>
          Contacts
        </a>
        <a href="/admin/settings.html" class="sidebar-link">
          <span class="nav-icon">&#9881;</span>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="AdminAPI.logout()" class="btn btn-outline btn-sm btn-block">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Done-For-You Orders</h1>
      </div>

      <div class="admin-content">
        <!-- Filters -->
        <div class="content-section">
          <div class="filters-bar">
            <select id="filter-status" class="form-select" onchange="loadOrders()">
              <option value="">All Statuses</option>
              <option value="pending">Pending</option>
              <option value="active">Active</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
            <select id="filter-category" class="form-select" onchange="loadOrders()">
              <option value="">All Services</option>
              <option value="done-for-you">Done-For-You</option>
            </select>
          </div>
        </div>

        <!-- Orders Table -->
        <div class="content-section">
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Client</th>
                  <th>Service</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Payment</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="orders-table">
                <tr>
                  <td colspan="8" class="text-center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div id="pagination" class="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Order Detail Modal -->
  <div id="order-modal" class="modal-overlay">
    <div class="modal modal-large">
      <div class="modal-header">
        <h3>DFY Order Details</h3>
        <button class="modal-close" onclick="AdminAPI.closeModal('order-modal')">&times;</button>
      </div>
      <div class="modal-body" id="order-detail">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="AdminAPI.closeModal('order-modal')">Close</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    AdminAPI.requireAuth();

    let currentPage = 1;
    let currentFilters = {};

    async function loadOrders(page = 1) {
      try {
        currentPage = page;
        currentFilters = {
          status: document.getElementById('filter-status').value,
          category: document.getElementById('filter-category').value,
          page
        };

        const data = await AdminAPI.getDfyOrders(currentFilters);

        // Render table
        const html = data.orders.map(order => `
          <tr>
            <td>#${order.id}</td>
            <td>
              ${AdminAPI.escapeHtml(order.first_name)} ${AdminAPI.escapeHtml(order.last_name)}<br>
              <small class="text-muted">${AdminAPI.escapeHtml(order.email)}</small>
            </td>
            <td>${AdminAPI.escapeHtml(order.service_name)}</td>
            <td>${AdminAPI.formatCurrency(order.amount)}</td>
            <td>${AdminAPI.renderBadge(order.status)}</td>
            <td>${AdminAPI.renderBadge(order.payment_status)}</td>
            <td>${AdminAPI.formatDate(order.created_at)}</td>
            <td class="actions">
              <button class="btn btn-sm btn-outline" onclick="viewOrder(${order.id})">View</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('orders-table').innerHTML = html || '<tr><td colspan="8" class="text-center">No orders found</td></tr>';

        // Render pagination
        AdminAPI.renderPagination('pagination', data.pagination, loadOrders);

      } catch (error) {
        AdminAPI.showError('Failed to load orders: ' + error.message);
        document.getElementById('orders-table').innerHTML = '<tr><td colspan="8" class="text-center">Error loading orders</td></tr>';
      }
    }

    async function viewOrder(id) {
      try {
        AdminAPI.openModal('order-modal');
        document.getElementById('order-detail').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

        const order = await AdminAPI.getDfyOrder(id);

        const html = `
          <div class="order-detail">
            <!-- Order Info -->
            <div class="order-info-grid">
              <div class="info-item">
                <label>Order ID</label>
                <div>#${order.id}</div>
              </div>
              <div class="info-item">
                <label>Client</label>
                <div>${AdminAPI.escapeHtml(order.first_name)} ${AdminAPI.escapeHtml(order.last_name)}</div>
              </div>
              <div class="info-item">
                <label>Email</label>
                <div>${AdminAPI.escapeHtml(order.email)}</div>
              </div>
              <div class="info-item">
                <label>Phone</label>
                <div>${order.phone || 'N/A'}</div>
              </div>
              <div class="info-item">
                <label>Service</label>
                <div>${AdminAPI.escapeHtml(order.service_name)}</div>
              </div>
              <div class="info-item">
                <label>Amount</label>
                <div>${AdminAPI.formatCurrency(order.amount)}</div>
              </div>
              <div class="info-item">
                <label>Status</label>
                <div>${AdminAPI.renderBadge(order.status)}</div>
              </div>
              <div class="info-item">
                <label>Payment Status</label>
                <div>${AdminAPI.renderBadge(order.payment_status)}</div>
              </div>
              <div class="info-item">
                <label>Current Step</label>
                <div>Step ${order.current_step}</div>
              </div>
              <div class="info-item">
                <label>Created</label>
                <div>${AdminAPI.formatDate(order.created_at)}</div>
              </div>
              <div class="info-item">
                <label>Stripe Payment ID</label>
                <div><small>${order.stripe_payment_id || 'N/A'}</small></div>
              </div>
            </div>

            <!-- Service Features -->
            <div style="margin-top: 1.5rem;">
              <h4 style="margin-bottom: 1rem;">Service Features</h4>
              <ul style="list-style: none; padding: 0;">
                ${order.features.map(f => `<li style="padding: 0.5rem 0; border-bottom: 1px solid var(--border-color);">&#10003; ${AdminAPI.escapeHtml(f)}</li>`).join('')}
              </ul>
            </div>

            <!-- Process Steps -->
            ${order.process_steps && order.process_steps.length > 0 ? `
              <div style="margin-top: 1.5rem;">
                <h4 style="margin-bottom: 1rem;">Process Steps</h4>
                <div class="progress-steps">
                  ${order.process_steps.map((step, idx) => `
                    <div class="progress-step-card">
                      <div class="progress-step-header">
                        <strong>Step ${idx + 1}: ${AdminAPI.escapeHtml(step)}</strong>
                        <span class="badge ${order.current_step > idx ? 'badge-success' : order.current_step === idx + 1 ? 'badge-info' : 'badge-warning'}">
                          ${order.current_step > idx ? 'Completed' : order.current_step === idx + 1 ? 'In Progress' : 'Pending'}
                        </span>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            <!-- Notes -->
            ${order.notes ? `
              <div style="margin-top: 1.5rem;">
                <h4 style="margin-bottom: 0.5rem;">Notes</h4>
                <p style="background: var(--bg-light); padding: 1rem; border-radius: var(--radius-md);">${AdminAPI.escapeHtml(order.notes)}</p>
              </div>
            ` : ''}

            <!-- Update Form -->
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 2px solid var(--border-color);">
              <h4 style="margin-bottom: 1rem;">Update Order</h4>
              <form id="update-order-form" onsubmit="updateOrder(event, ${order.id})">
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                      <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                      <option value="active" ${order.status === 'active' ? 'selected' : ''}>Active</option>
                      <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                      <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Current Step</label>
                    <input type="number" name="currentStep" class="form-input" value="${order.current_step}" min="1" max="${order.process_steps.length}">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Notes</label>
                  <textarea name="notes" class="form-textarea">${order.notes || ''}</textarea>
                </div>
                <button type="submit" class="btn btn-primary">Update Order</button>
              </form>
            </div>
          </div>
        `;

        document.getElementById('order-detail').innerHTML = html;
      } catch (error) {
        AdminAPI.showError('Failed to load order details: ' + error.message);
      }
    }

    async function updateOrder(event, orderId) {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);

      try {
        await AdminAPI.updateDfyOrder(orderId, {
          status: formData.get('status'),
          currentStep: parseInt(formData.get('currentStep')),
          notes: formData.get('notes')
        });

        AdminAPI.showSuccess('Order updated successfully');
        AdminAPI.closeModal('order-modal');
        loadOrders(currentPage);
      } catch (error) {
        AdminAPI.showError('Failed to update order: ' + error.message);
      }
    }

    loadOrders();
  </script>
</body>
</html>

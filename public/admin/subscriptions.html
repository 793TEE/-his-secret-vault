<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscriptions - Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h1>His Secret Vault</h1>
        <span>Admin Portal</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="sidebar-link">
          <span class="nav-icon">&#128200;</span>
          Dashboard
        </a>
        <a href="/admin/clients.html" class="sidebar-link">
          <span class="nav-icon">&#128101;</span>
          Clients
        </a>
        <a href="/admin/subscriptions.html" class="sidebar-link active">
          <span class="nav-icon">&#128179;</span>
          Subscriptions
        </a>
        <a href="/admin/dfy-orders.html" class="sidebar-link">
          <span class="nav-icon">&#128230;</span>
          DFY Orders
        </a>
        <a href="/admin/plans.html" class="sidebar-link">
          <span class="nav-icon">&#128176;</span>
          Plans & Bundles
        </a>
        <a href="/admin/leads.html" class="sidebar-link">
          <span class="nav-icon">&#127919;</span>
          Leads
        </a>
        <a href="/admin/contacts.html" class="sidebar-link">
          <span class="nav-icon">&#128236;</span>
          Contacts
        </a>
        <a href="/admin/settings.html" class="sidebar-link">
          <span class="nav-icon">&#9881;</span>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="AdminAPI.logout()" class="btn btn-outline btn-sm btn-block">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Subscriptions</h1>
      </div>

      <div class="admin-content">
        <!-- Filters -->
        <div class="content-section">
          <div class="filters-bar">
            <select id="filter-type" class="form-select" onchange="loadSubscriptions()">
              <option value="">All Types</option>
              <option value="plan">Plans</option>
              <option value="bundle">Bundles</option>
              <option value="custom">Custom</option>
            </select>
            <select id="filter-status" class="form-select" onchange="loadSubscriptions()">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="past_due">Past Due</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>

        <!-- Subscriptions Table -->
        <div class="content-section">
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Client</th>
                  <th>Type</th>
                  <th>Plan/Bundle</th>
                  <th>Price</th>
                  <th>Status</th>
                  <th>Next Billing</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="subscriptions-table">
                <tr>
                  <td colspan="8" class="text-center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div id="pagination" class="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Subscription Detail Modal -->
  <div id="subscription-modal" class="modal-overlay">
    <div class="modal modal-large">
      <div class="modal-header">
        <h3>Subscription Details</h3>
        <button class="modal-close" onclick="AdminAPI.closeModal('subscription-modal')">&times;</button>
      </div>
      <div class="modal-body" id="subscription-detail">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="AdminAPI.closeModal('subscription-modal')">Close</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    AdminAPI.requireAuth();

    let currentPage = 1;
    let currentFilters = {};

    async function loadSubscriptions(page = 1) {
      try {
        currentPage = page;
        currentFilters = {
          type: document.getElementById('filter-type').value,
          status: document.getElementById('filter-status').value,
          page
        };

        const data = await AdminAPI.getSubscriptions(currentFilters);

        // Render table
        const html = data.subscriptions.map(sub => {
          const planName = sub.plan_name || sub.bundle_name || 'Custom Bundle';
          const price = sub.plan_price || sub.bundle_price || 0;
          const typeLabel = sub.subscription_type.charAt(0).toUpperCase() + sub.subscription_type.slice(1);

          return `
            <tr>
              <td>#${sub.id}</td>
              <td>
                ${AdminAPI.escapeHtml(sub.first_name)} ${AdminAPI.escapeHtml(sub.last_name)}<br>
                <small class="text-muted">${AdminAPI.escapeHtml(sub.email)}</small>
              </td>
              <td><span class="badge badge-info">${typeLabel}</span></td>
              <td>${AdminAPI.escapeHtml(planName)}</td>
              <td>${AdminAPI.formatCurrency(price)}/mo</td>
              <td>${AdminAPI.renderBadge(sub.status)}</td>
              <td>${sub.current_period_end ? AdminAPI.formatDate(sub.current_period_end) : 'N/A'}</td>
              <td class="actions">
                <button class="btn btn-sm btn-outline" onclick="viewSubscription(${sub.id})">View</button>
                ${sub.status === 'active' ? `<button class="btn btn-sm btn-danger" onclick="cancelSubscription(${sub.id})">Cancel</button>` : ''}
              </td>
            </tr>
          `;
        }).join('');

        document.getElementById('subscriptions-table').innerHTML = html || '<tr><td colspan="8" class="text-center">No subscriptions found</td></tr>';

        // Render pagination
        AdminAPI.renderPagination('pagination', data.pagination, loadSubscriptions);

      } catch (error) {
        AdminAPI.showError('Failed to load subscriptions: ' + error.message);
        document.getElementById('subscriptions-table').innerHTML = '<tr><td colspan="8" class="text-center">Error loading subscriptions</td></tr>';
      }
    }

    async function viewSubscription(id) {
      try {
        AdminAPI.openModal('subscription-modal');
        document.getElementById('subscription-detail').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

        const sub = await AdminAPI.getSubscription(id);

        const planName = sub.plan_name || sub.bundle_name || 'Custom Bundle';
        const price = sub.plan_price || sub.bundle_price || 0;
        const modes = sub.plan_modes || sub.bundle_modes || sub.custom_modes || [];

        const html = `
          <div class="order-info-grid">
            <div class="info-item">
              <label>Subscription ID</label>
              <div>#${sub.id}</div>
            </div>
            <div class="info-item">
              <label>Client</label>
              <div>${AdminAPI.escapeHtml(sub.first_name)} ${AdminAPI.escapeHtml(sub.last_name)}</div>
            </div>
            <div class="info-item">
              <label>Email</label>
              <div>${AdminAPI.escapeHtml(sub.email)}</div>
            </div>
            <div class="info-item">
              <label>Type</label>
              <div><span class="badge badge-info">${sub.subscription_type.toUpperCase()}</span></div>
            </div>
            <div class="info-item">
              <label>Plan/Bundle</label>
              <div>${AdminAPI.escapeHtml(planName)}</div>
            </div>
            <div class="info-item">
              <label>Price</label>
              <div>${AdminAPI.formatCurrency(price)}/mo</div>
            </div>
            <div class="info-item">
              <label>Status</label>
              <div>${AdminAPI.renderBadge(sub.status)}</div>
            </div>
            <div class="info-item">
              <label>Stripe Subscription ID</label>
              <div><small>${sub.stripe_subscription_id || 'N/A'}</small></div>
            </div>
            <div class="info-item">
              <label>Current Period Start</label>
              <div>${sub.current_period_start ? AdminAPI.formatDate(sub.current_period_start) : 'N/A'}</div>
            </div>
            <div class="info-item">
              <label>Current Period End</label>
              <div>${sub.current_period_end ? AdminAPI.formatDate(sub.current_period_end) : 'N/A'}</div>
            </div>
            <div class="info-item">
              <label>Cancel at Period End</label>
              <div>${sub.cancel_at_period_end ? 'Yes' : 'No'}</div>
            </div>
            <div class="info-item">
              <label>Created</label>
              <div>${AdminAPI.formatDate(sub.created_at)}</div>
            </div>
          </div>

          <div style="margin-top: 1.5rem;">
            <h4 style="margin-bottom: 1rem;">Included AI Modes</h4>
            <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
              ${modes.map(mode => `<span class="badge badge-gold">${AdminAPI.escapeHtml(mode)}</span>`).join('')}
            </div>
          </div>
        `;

        document.getElementById('subscription-detail').innerHTML = html;
      } catch (error) {
        AdminAPI.showError('Failed to load subscription details: ' + error.message);
      }
    }

    async function cancelSubscription(id) {
      if (!confirm('Are you sure you want to cancel this subscription? It will remain active until the end of the billing period.')) {
        return;
      }

      try {
        await AdminAPI.cancelSubscription(id);
        AdminAPI.showSuccess('Subscription cancelled successfully');
        loadSubscriptions(currentPage);
      } catch (error) {
        AdminAPI.showError('Failed to cancel subscription: ' + error.message);
      }
    }

    loadSubscriptions();
  </script>
</body>
</html>

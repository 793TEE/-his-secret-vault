<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services - Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h1>His Secret Vault</h1>
        <span>Admin Portal</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="sidebar-link">
          <span class="nav-icon">&#128200;</span>
          Dashboard
        </a>
        <a href="/admin/clients.html" class="sidebar-link">
          <span class="nav-icon">&#128101;</span>
          Clients
        </a>
        <a href="/admin/orders.html" class="sidebar-link">
          <span class="nav-icon">&#128230;</span>
          Orders
        </a>
        <a href="/admin/leads.html" class="sidebar-link">
          <span class="nav-icon">&#127919;</span>
          Leads
        </a>
        <a href="/admin/contacts.html" class="sidebar-link">
          <span class="nav-icon">&#128236;</span>
          Contacts
        </a>
        <a href="/admin/services.html" class="sidebar-link active">
          <span class="nav-icon">&#128736;</span>
          Services
        </a>
        <a href="/admin/settings.html" class="sidebar-link">
          <span class="nav-icon">&#9881;</span>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="AdminAPI.logout()" class="btn btn-outline btn-sm btn-block">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Service Management</h1>
      </div>

      <div class="admin-content">
        <div class="content-section">
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Price Range</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="services-table">
                <tr>
                  <td colspan="6" class="text-center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Service Modal -->
  <div id="edit-modal" class="modal-overlay">
    <div class="modal modal-large">
      <div class="modal-header">
        <h3>Edit Service</h3>
        <button class="modal-close" onclick="AdminAPI.closeModal('edit-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="edit-service-form">
          <input type="hidden" id="edit-service-id">
          <div class="form-group">
            <label class="form-label">Service Name</label>
            <input type="text" id="edit-name" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="edit-description" class="form-textarea" rows="4"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Min Price</label>
              <input type="number" id="edit-price-min" class="form-input" step="0.01" required>
            </div>
            <div class="form-group">
              <label class="form-label">Max Price</label>
              <input type="number" id="edit-price-max" class="form-input" step="0.01">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Features (one per line)</label>
            <textarea id="edit-features" class="form-textarea" rows="6" placeholder="State Filing & Processing
EIN/Tax ID Number
Operating Agreement"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="edit-active" class="form-select">
              <option value="1">Active</option>
              <option value="0">Inactive</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="AdminAPI.closeModal('edit-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveService()">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    AdminAPI.requireAuth();

    async function loadServices() {
      try {
        const services = await AdminAPI.getServices();

        const html = services.map(service => `
          <tr>
            <td>#${service.id}</td>
            <td>${AdminAPI.escapeHtml(service.name)}</td>
            <td><span class="badge badge-info">${AdminAPI.escapeHtml(service.category)}</span></td>
            <td>${AdminAPI.formatCurrency(service.price_min)}${service.price_max ? ' - ' + AdminAPI.formatCurrency(service.price_max) : ''}</td>
            <td>${service.active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-danger">Inactive</span>'}</td>
            <td>
              <button class="btn btn-sm btn-outline" onclick="editService(${service.id})">Edit</button>
            </td>
          </tr>
        `).join('');

        document.getElementById('services-table').innerHTML = html || '<tr><td colspan="6" class="text-center">No services found</td></tr>';

      } catch (error) {
        AdminAPI.showError('Failed to load services: ' + error.message);
      }
    }

    async function editService(id) {
      try {
        const services = await AdminAPI.getServices();
        const service = services.find(s => s.id === id);

        if (!service) return;

        document.getElementById('edit-service-id').value = service.id;
        document.getElementById('edit-name').value = service.name;
        document.getElementById('edit-description').value = service.description || '';
        document.getElementById('edit-price-min').value = service.price_min;
        document.getElementById('edit-price-max').value = service.price_max || '';
        document.getElementById('edit-features').value = service.features.join('\n');
        document.getElementById('edit-active').value = service.active ? '1' : '0';

        AdminAPI.openModal('edit-modal');
      } catch (error) {
        AdminAPI.showError('Failed to load service: ' + error.message);
      }
    }

    async function saveService() {
      const id = document.getElementById('edit-service-id').value;
      const featuresText = document.getElementById('edit-features').value;
      const features = featuresText.split('\n').filter(f => f.trim()).map(f => f.trim());

      const data = {
        name: document.getElementById('edit-name').value,
        description: document.getElementById('edit-description').value,
        priceMin: parseFloat(document.getElementById('edit-price-min').value),
        priceMax: parseFloat(document.getElementById('edit-price-max').value) || null,
        features: features,
        active: parseInt(document.getElementById('edit-active').value)
      };

      try {
        await AdminAPI.updateService(id, data);
        AdminAPI.closeModal('edit-modal');
        AdminAPI.showSuccess('Service updated successfully');
        loadServices();
      } catch (error) {
        AdminAPI.showError('Failed to update service: ' + error.message);
      }
    }

    loadServices();
  </script>
</body>
</html>

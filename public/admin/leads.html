<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads - Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <h1>His Secret Vault</h1>
        <span>Admin Portal</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="sidebar-link">
          <span class="nav-icon">&#128200;</span>
          Dashboard
        </a>
        <a href="/admin/clients.html" class="sidebar-link">
          <span class="nav-icon">&#128101;</span>
          Clients
        </a>
        <a href="/admin/subscriptions.html" class="sidebar-link">
          <span class="nav-icon">&#128179;</span>
          Subscriptions
        </a>
        <a href="/admin/dfy-orders.html" class="sidebar-link">
          <span class="nav-icon">&#128230;</span>
          DFY Orders
        </a>
        <a href="/admin/plans.html" class="sidebar-link">
          <span class="nav-icon">&#128176;</span>
          Plans & Bundles
        </a>
        <a href="/admin/leads.html" class="sidebar-link active">
          <span class="nav-icon">&#127919;</span>
          Leads
        </a>
        <a href="/admin/contacts.html" class="sidebar-link">
          <span class="nav-icon">&#128236;</span>
          Contacts
        </a>
        <a href="/admin/settings.html" class="sidebar-link">
          <span class="nav-icon">&#9881;</span>
          Settings
        </a>
      </nav>
      <div class="sidebar-footer">
        <button onclick="AdminAPI.logout()" class="btn btn-outline btn-sm btn-block">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>Lead Management</h1>
      </div>

      <div class="admin-content">
        <!-- Filters -->
        <div class="filters-bar">
          <select id="source-filter" class="form-select" style="max-width: 250px;">
            <option value="">All Sources</option>
            <option value="credit-calculator">Credit Calculator</option>
            <option value="business-name">Business Name Checker</option>
            <option value="funding-quiz">Funding Quiz</option>
            <option value="contact-form">Contact Form</option>
          </select>
          <select id="converted-filter" class="form-select" style="max-width: 200px;">
            <option value="">All Status</option>
            <option value="false">New Leads</option>
            <option value="true">Converted</option>
          </select>
          <button onclick="loadLeads()" class="btn btn-primary btn-sm">Apply Filters</button>
        </div>

        <!-- Leads Table -->
        <div class="content-section">
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Source</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="leads-table">
                <tr>
                  <td colspan="8" class="text-center">Loading...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" class="pagination"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Lead Detail Modal -->
  <div id="lead-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Lead Details</h3>
        <button class="modal-close" onclick="AdminAPI.closeModal('lead-modal')">&times;</button>
      </div>
      <div class="modal-body" id="lead-detail-content">
        Loading...
      </div>
    </div>
  </div>

  <script src="/admin/js/admin.js"></script>
  <script>
    AdminAPI.requireAuth();

    let currentPage = 1;

    async function loadLeads(page = 1) {
      currentPage = page;
      const source = document.getElementById('source-filter').value;
      const converted = document.getElementById('converted-filter').value;

      try {
        const data = await AdminAPI.getLeads({ source, converted, page });

        const html = data.leads.map(lead => `
          <tr>
            <td>#${lead.id}</td>
            <td>${AdminAPI.escapeHtml(lead.first_name || '')} ${AdminAPI.escapeHtml(lead.last_name || '')}</td>
            <td>${AdminAPI.escapeHtml(lead.email)}</td>
            <td>${AdminAPI.escapeHtml(lead.phone || '-')}</td>
            <td><span class="badge badge-info">${AdminAPI.escapeHtml(lead.source)}</span></td>
            <td>${lead.converted ? '<span class="badge badge-success">Converted</span>' : '<span class="badge badge-warning">New</span>'}</td>
            <td>${AdminAPI.formatDate(lead.created_at)}</td>
            <td>
              <button class="btn btn-sm btn-outline" onclick="viewLead(${lead.id})">View</button>
              ${!lead.converted ? `<button class="btn btn-sm btn-primary" onclick="convertLead(${lead.id})">Convert</button>` : ''}
            </td>
          </tr>
        `).join('');

        document.getElementById('leads-table').innerHTML = html || '<tr><td colspan="8" class="text-center">No leads found</td></tr>';

        // Render pagination
        AdminAPI.renderPagination('pagination', data.pagination, loadLeads);

      } catch (error) {
        AdminAPI.showError('Failed to load leads: ' + error.message);
      }
    }

    function viewLead(id) {
      // Find the lead in the current loaded data
      AdminAPI.getLeads({ page: currentPage }).then(data => {
        const lead = data.leads.find(l => l.id === id);
        if (!lead) return;

        let quizHtml = '';
        if (lead.quiz_results && Object.keys(lead.quiz_results).length > 0) {
          quizHtml = '<h4>Quiz Results</h4><ul style="list-style: none; padding: 0;">';
          for (const [key, value] of Object.entries(lead.quiz_results)) {
            quizHtml += `<li style="margin-bottom: 0.5rem;"><strong>${AdminAPI.escapeHtml(key)}:</strong> ${AdminAPI.escapeHtml(value)}</li>`;
          }
          quizHtml += '</ul>';
        }

        const html = `
          <div class="lead-detail">
            <div class="info-item">
              <label>Name</label>
              <div>${AdminAPI.escapeHtml(lead.first_name || '')} ${AdminAPI.escapeHtml(lead.last_name || '')}</div>
            </div>
            <div class="info-item">
              <label>Email</label>
              <div>${AdminAPI.escapeHtml(lead.email)}</div>
            </div>
            <div class="info-item">
              <label>Phone</label>
              <div>${AdminAPI.escapeHtml(lead.phone || '-')}</div>
            </div>
            <div class="info-item">
              <label>Source</label>
              <div><span class="badge badge-info">${AdminAPI.escapeHtml(lead.source)}</span></div>
            </div>
            <div class="info-item">
              <label>Status</label>
              <div>${lead.converted ? '<span class="badge badge-success">Converted</span>' : '<span class="badge badge-warning">New</span>'}</div>
            </div>
            <div class="info-item">
              <label>Date</label>
              <div>${AdminAPI.formatDate(lead.created_at)}</div>
            </div>
            ${quizHtml}
          </div>
        `;

        document.getElementById('lead-detail-content').innerHTML = html;
        AdminAPI.openModal('lead-modal');
      });
    }

    async function convertLead(id) {
      if (!confirm('Mark this lead as converted?')) return;

      try {
        await AdminAPI.convertLead(id);
        AdminAPI.showSuccess('Lead marked as converted');
        loadLeads(currentPage);
      } catch (error) {
        AdminAPI.showError('Failed to convert lead: ' + error.message);
      }
    }

    loadLeads();
  </script>
</body>
</html>
